# SmartHomeClaw Agent 基础配置

agent:
  name: "SmartHomeClaw"
  version: "1.0.0"
  
# Qwen Code 无头模式配置
qwen:
  output_format: "json"
  yolo: true
  approval_mode: "auto_edit"

  
# 记忆系统配置
memory:
  directory: "./memory"
  user_profile: "USER_PROFILE.md"
  habits: "HABITS.md"
  facts: "FACTS.md"

# 语言模型配置 (与 Python 版一致，使用 providers 数组)
models:
  default: "nvidia/openai/gpt-oss-120b"
  providers:
    - name: volcengine
      base_url: "https://ark.cn-beijing.volces.com/api/coding/v3"
      api_key_env: "VOLCENGINE_API_KEY"
      models:
        - id: "DeepSeek-V3.2"
          thinking: true    # 是否开启思考模式 (extended thinking / reasoning)
          stream: true      # 是否开启流式输出

  
