# SmartHome Agent Main Configuration / 智能家居 Agent 主配置文件

agent:
  name: "SmartHome Agent"
  version: "1.0.0"
  session_dir: "sessions"      # Directory for persisting chat history / 聊天历史持久化目录
  description: "Local SmartHome AI Agent, supports MCP/Skill extension / 本地智能家居 AI Agent，支持 MCP/Skill 扩展"

# LLM Model Config (OpenAI compatible) / LLM 模型配置（支持任何 OpenAI 协议兼容模型）
model:
  # Default model / 默认模型配置
  default: "nvidia/openai/gpt-oss-120b"
  # Model list / 模型列表（可按需切换）
  providers:
    - name: "openai"
      base_url: "https://api.openai.com/v1"
      api_key_env: "OPENAI_API_KEY"
      models:
        - "gpt-4o"
        - "gpt-4o-mini"
    - name: "deepseek"
      base_url: "https://api.deepseek.com/v1"
      api_key_env: "DEEPSEEK_API_KEY"
      models:
        - "deepseek-chat"
        - "deepseek-reasoner"
    - name: "claude"
      base_url: "https://api.anthropic.com/v1"
      api_key_env: "ANTHROPIC_API_KEY"
      models:
        - "claude-sonnet-4-5"
    - name: "local"
      base_url: "http://localhost:11434/v1"
      api_key_env: "OLLAMA_API_KEY"  # Ollie doesn't validate keys
      models:
        - "qwen2.5:7b"
        - "llama3.2:3b"
    - name: "nvidia"
      base_url: "https://integrate.api.nvidia.com/v1"  # Free models
      api_key_env: "NVIDIA_API_KEY"
      models:
        - "openai/gpt-oss-120b"

# Heartbeat Config / 心跳配置
heartbeat:
  enabled: true
  interval_minutes: 5       # Heartbeat interval / 心跳间隔（分钟）
  task_file: "config/HEARTBEAT.md"  # Task description / 心跳任务描述文档

# MCP Server Config / MCP Server 配置
mcp_servers:
  # Examples / 示例：
  - name: "smarthome"
    transport: "stdio"
    command: ["/Volumes/sandiskSSD/Project/xuexi/linux_openclaw/.venv/bin/python3", "/Volumes/sandiskSSD/Project/xuexi/linux_openclaw/zhinengjiaju/smarthome_mcp/server.py"]



# CLI Config / CLI 配置
cli:
  prompt: "🏠 > "          # CLI prompt / 命令行提示符
  history_file: ".agent_history"  # History file / 命令历史文件
  max_context_turns: 20    # Max context turns / 最大对话轮数

# Memory Config / 记忆配置
memory:
  dir: "memory"
  auto_save: true           # Auto-analyze habits / 对话后自动分析并保存习惯
  files:
    profile: "USER_PROFILE.md"
    habits: "HABITS.md"
    facts: "FACTS.md"


# Skills Config / 插件配置
skills:
  feishu:
    app_id_env: "FEISHU_APP_ID"        # Env var name for App ID / App ID 环境变量名
    app_secret_env: "FEISHU_APP_SECRET" # Env var name for App Secret / App Secret 环境变量名
    enable_listener: true              # Enable WebSocket listener / 开启长连接监听
    auto_reply: true                   # AI auto reply / 开启 AI 自动回复关键词
