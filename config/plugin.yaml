# 插件配置

plugins:
  # 飞书插件
  feishu:
    enabled: true
    app_id: "${FEISHU_APP_ID}"
    app_secret: "${FEISHU_APP_SECRET}"
    enable_listener: true
    auto_reply: true
    # notification_chat_id: "oc_8a046ca7cb2879b737045340f86216f4" # 在这里填入你的群 ID 或私聊 ID

  # MCPorter 插件 — MCP Server 客户端
  mcporter:
    enabled: true
    config_path: "./config/mcporter.json"
    timeout: 30000
    
  # 其他插件示例:
  # wechat:
  #   enabled: false
  #   token: "${WECHAT_TOKEN}"
  
  # dingtalk:
  #   enabled: false
  #   webhook: "${DINGTALK_WEBHOOK}"
